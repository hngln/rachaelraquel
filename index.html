  <script>
    const prefersReduced = window.matchMedia(
      "(prefers-reduced-motion: reduce)",
    ).matches;

    // bunting: sagging string with flags hanging from each dip
    const buntingEl = document.getElementById("bunting");
    const FLAG_COLORS = ["#c96f4a", "#d99a3c", "#4b6b4a"];
    // fixed per-flag tilt and size wobble so the digits read hand painted, not cloned
    const DIGIT_TILT = [-3.2, 2.4, -1.6, 3.4, -2.8, 1.9];
    const DIGIT_SIZE = [1.04, 0.95, 1.02, 0.97, 1.05, 0.96];
    function drawBunting() {
      const W = buntingEl.clientWidth;
      const H = buntingEl.clientHeight;
      if (!W) return;
      const DOB = "160704"; // one digit per flag, her date of birth
      const n = DOB.length;
      const flagW = (W / n) * 0.72;
      const flagH = flagW * 0.82;
      const anchorY = 12;
      const sag = Math.min(90, W * 0.075);

      // string spans the whole width, dipping in the middle
      const yAt = (x) => anchorY + sag * (1 - Math.pow((2 * x) / W - 1, 2));
      const slopeAt = (x) => (sag * -4 * ((2 * x) / W - 1)) / W;

      let d = `M 0 ${yAt(0).toFixed(1)}`;
      for (let x = 6; x < W; x += 6)
        d += ` L ${x.toFixed(1)} ${yAt(x).toFixed(1)}`;
      d += ` L ${W} ${yAt(W).toFixed(1)}`;

      let flags = "";
      for (let i = 0; i < n; i++) {
        const cx = (W * (i + 0.5)) / n;
        const cy = yAt(cx);
        const ang = (Math.atan(slopeAt(cx)) * 180) / Math.PI;
        const c = FLAG_COLORS[i % 3];
        flags += `<g transform="translate(${cx.toFixed(1)} ${cy.toFixed(
          1,
        )}) rotate(${ang.toFixed(2)})" filter="url(#buntingDrop)">
          <g class="flag-cloth">
            <polygon points="${-flagW / 2},0 ${flagW / 2},0 0,${flagH}" fill="${c}"/>
            <text x="0" y="${(flagH * 0.34).toFixed(1)}" dy="0.35em" text-anchor="middle"
              transform="rotate(${DIGIT_TILT[i]})"
              font-family="Caveat, cursive" font-weight="600" font-size="${(flagW * 0.66 * DIGIT_SIZE[i]).toFixed(1)}"
              fill="#f2ead9">${DOB[i]}</text>
          </g>
        </g>`;
      }

      buntingEl.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMin meet">
        <defs>
          <filter id="buntingDrop" x="-20%" y="-20%" width="140%" height="180%">
            <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#3c3022" flood-opacity="0.3"/>
          </filter>
        </defs>
        <g>
          ${flags}
          <path d="${d}" fill="none" stroke="#6f6045" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
        </g>
      </svg>`;
    }
    drawBunting();
    window.addEventListener("resize", drawBunting);

    // now and then a random flag flaps, like a small draft
    function scheduleFlap() {
      setTimeout(
        () => {
          const cloths = buntingEl.querySelectorAll(".flag-cloth");
          if (cloths.length) {
            const f = cloths[(Math.random() * cloths.length) | 0];
            f.classList.remove("flap");
            void f.getBoundingClientRect();
            f.classList.add("flap");
          }
          scheduleFlap();
        },
        3000 + Math.random() * 4000,
      );
    }
    if (!prefersReduced) scheduleFlap();

    // table edge near the top of the plate; gifts rest on the table beside the cake
    function positionFloor() {
      const plate = document.querySelector(".wrapper .plate");
      if (!plate) return;
      const r = plate.getBoundingClientRect();
      const y = ((r.top + r.height * 0.1) / window.innerHeight) * 100;
      const root = document.documentElement.style;
      root.setProperty("--floorY", y.toFixed(1) + "%");
      root.setProperty("--giftLeft", (r.left - 88).toFixed(0) + "px");
      root.setProperty("--giftTop", (r.bottom - 4).toFixed(0) + "px");
      root.setProperty("--plantLeft", (r.right + 34).toFixed(0) + "px");
      root.setProperty("--hintY", (r.bottom + 22).toFixed(0) + "px");
      // centre the message in the band between the bunting and the psst pill
      const pill = document.getElementById("earHint");
      if (pill) {
        const top = 120;
        const pillTop = pill.getBoundingClientRect().top;
        root.setProperty("--msgY", ((top + pillTop) / 2).toFixed(0) + "px");
        // cap the font so even a three-line message stays inside the band
        const fs = Math.min(
          window.innerWidth * 0.08,
          (pillTop - top) / 3.6,
          64,
        );
        root.setProperty("--msgFs", fs.toFixed(1) + "px");
      }
    }
    positionFloor();
    window.addEventListener("resize", positionFloor);
    window.addEventListener("load", positionFloor);

    // cake entrance
    const timeline = gsap.timeline({ duration: 0.3 });
    timeline.fromTo(
      ".cake-topping",
      { yPercent: -300, opacity: 0.5 },
      { yPercent: 0, opacity: 1 },
    );
    timeline.to(".candle-container", { opacity: 1 });

    // confetti
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    function sizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    sizeCanvas();
    window.addEventListener("resize", sizeCanvas);

    const CONFETTI_COLORS = [
      "#c96f4a",
      "#e0a13c",
      "#4b6b4a",
      "#8ba888",
      "#f2ead9",
      "#6f8a68",
    ];
    let confetti = [];
    const CONFETTI_SHAPES = ["rect", "rect", "circle", "streamer"];
    function addConfettiPiece(x, y, vx, vy, drifting) {
      confetti.push({
        x: x,
        y: y,
        vx: vx,
        vy: vy,
        g: (drifting ? 0.045 : 0.08) + Math.random() * 0.04,
        size: 6 + Math.random() * 6,
        shape: CONFETTI_SHAPES[(Math.random() * CONFETTI_SHAPES.length) | 0],
        color: CONFETTI_COLORS[(Math.random() * CONFETTI_COLORS.length) | 0],
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        life: 1,
        decay: 0.0035 + Math.random() * 0.0015,
        sway: Math.random() * 2 - 1,
      });
    }
    function burstConfetti(x, y) {
      const count = prefersReduced ? 60 : 160;
      for (let i = 0; i < count; i++) {
        addConfettiPiece(
          x,
          y,
          (Math.random() - 0.5) * 13,
          Math.random() * -13 - 5,
        );
      }
    }
    // corner cannons fire up and inward; dir 1 from the left corner, -1 from the right
    function cannonConfetti(x, y, dir) {
      if (prefersReduced) return;
      for (let i = 0; i < 140; i++) {
        addConfettiPiece(
          x,
          y - Math.random() * 80,
          dir * (3.5 + Math.random() * 9),
          -(11 + Math.random() * 9),
        );
      }
    }
    // light pieces drift down from the top for a while after the bursts
    function confettiRain(duration) {
      if (prefersReduced) return;
      const end = performance.now() + duration;
      (function drip() {
        if (performance.now() > end) return;
        for (let i = 0; i < 5; i++) {
          addConfettiPiece(
            Math.random() * canvas.width,
            -14,
            (Math.random() - 0.5) * 1.6,
            1 + Math.random() * 1.6,
            true,
          );
        }
        setTimeout(drip, 120);
      })();
    }
    function renderConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = confetti.length - 1; i >= 0; i--) {
        const p = confetti[i];
        p.vx *= 0.97;
        p.vy = p.vy * 0.97 + p.g;
        p.x += p.vx + Math.sin(p.life * 10) * p.sway * 0.3;
        p.y += p.vy;
        p.rot += p.vr;
        p.life -= p.decay;
        if (p.life <= 0 || p.y > canvas.height + 20) {
          confetti.splice(i, 1);
          continue;
        }
        ctx.save();
        ctx.globalAlpha = p.life > 0.25 ? 1 : Math.max(0, p.life / 0.25);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        // paper flip as the piece tumbles
        if (p.shape !== "circle")
          ctx.scale(1, 0.35 + Math.abs(Math.sin(p.rot * 2)) * 0.65);
        ctx.fillStyle = p.color;
        if (p.shape === "circle") {
          ctx.beginPath();
          ctx.arc(0, 0, p.size * 0.38, 0, 7);
          ctx.fill();
        } else if (p.shape === "streamer") {
          ctx.fillRect(
            -p.size * 0.2,
            -p.size * 1.1,
            p.size * 0.4,
            p.size * 2.2,
          );
        } else {
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        }
        ctx.restore();
      }
      requestAnimationFrame(renderConfetti);
    }
    renderConfetti();

    // gift easter egg: enough taps pop the box open, the prize is a troll note
    const giftEgg = document.getElementById("giftEgg");
    const giftPop = document.getElementById("giftPop");
    let giftTaps = 0;
    let giftOpened = false;
    function showGiftNote() {
      giftPop.classList.add("show");
    }
    document
      .getElementById("giftPopClose")
      .addEventListener("click", () => giftPop.classList.remove("show"));
    giftPop.addEventListener("click", (e) => {
      if (e.target === giftPop) giftPop.classList.remove("show");
    });
    giftEgg.addEventListener("click", () => {
      // the unboxing unlocks with the cat ears; before that the box is a
      // plain prop that hops like the plant
      if (!earsFound) {
        hop(giftEgg.querySelector(".box"));
        return;
      }
      if (giftOpened) {
        showGiftNote();
        return;
      }
      giftTaps++;
      const box = giftEgg.querySelector(".box");
      // each tap shakes harder and loosens the wrapping a step further
      box.style.setProperty("--amp", Math.min(2 + giftTaps * 2, 10) + "deg");
      box.classList.remove("shake", "hop");
      void box.getBoundingClientRect();
      box.classList.add("shake");
      box.classList.add("worn" + Math.min(giftTaps, 3));
      if (giftTaps >= 4) {
        giftOpened = true;
        giftEgg.classList.add("open");
        if (!prefersReduced) {
          const r = giftEgg.getBoundingClientRect();
          for (let i = 0; i < 26; i++)
            addConfettiPiece(
              r.left + r.width / 2,
              r.top,
              (Math.random() - 0.5) * 6,
              Math.random() * -7 - 2,
            );
        }
        showGiftNote();
      }
    });

    // smoke puff
    function puffSmoke() {
      const wrap = document.querySelector(".candle-wrap");
      for (let i = 0; i < 3; i++) {
        const s = document.createElement("div");
        s.className = "smoke";
        wrap.appendChild(s);
        gsap.fromTo(
          s,
          { y: -6, x: 0, opacity: 0.5, scale: 0.4 },
          {
            y: -72 - i * 12,
            x: (i - 1) * 12,
            opacity: 0,
            scale: 1.5,
            duration: 1.6 + i * 0.25,
            ease: "power1.out",
            onComplete: () => s.remove(),
          },
        );
      }
    }

    // messages
    const MESSAGES = [
      "a few more wishes for you",
      "may you see more mountains than deadlines",
      "may you remember the good food you ate",
      "may every cat let you pat them",
      "go do everything you keep saying",
      "you take care of people in ways they don't even notice hope this is the year it comes back to you",
      "happy 22nd birthday rachael",
    ];
    const line = document.getElementById("content-line");
    let msgTl = null;
    let hasPlayedMessages = false;
    function startMessages() {
      stopMessages();
      msgTl = gsap.timeline({
        delay: 6.8,
        onComplete: () => {
          hasPlayedMessages = true;
          gsap.delayedCall(2, unlockEars);
        },
      });
      MESSAGES.forEach((m, i) => {
        const isLast = i === MESSAGES.length - 1;
        const isSincere = i === MESSAGES.length - 2;
        msgTl.call(() => {
          line.textContent = m;
        });
        const gap = i > 0 ? "+=0.4" : "+=0";
        if (isSincere) {
          // the sincere line appears still and soft, no slide
          msgTl.fromTo(
            line,
            { opacity: 0, y: 0, scale: 0.97 },
            { opacity: 1, scale: 1, duration: 1.1, ease: "power1.out" },
            gap,
          );
        } else if (isLast) {
          // the greeting lands with a small settle and stays
          msgTl.fromTo(
            line,
            { opacity: 0, y: 30, scale: 1 },
            { opacity: 1, y: 0, duration: 0.8, ease: "back.out(1.6)" },
            gap,
          );
        } else {
          msgTl.fromTo(
            line,
            { opacity: 0, y: 24 },
            { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
            gap,
          );
        }
        if (!isLast) {
          // the sincere line holds long enough for a read, a re-read, and
          // the pause where it sinks in
          msgTl.to(
            line,
            { opacity: 0, y: -24, duration: 0.5, ease: "power2.in" },
            "+=" + (isSincere ? 5 : i === 0 ? 3.4 : 2.4),
          );
        }
      });
    }
    function stopMessages() {
      if (msgTl) {
        msgTl.kill();
        msgTl = null;
      }
      line.textContent = "";
      gsap.set(line, { opacity: 0 });
    }

    // tap the character for the cat ears; a nudge fades in later if she misses it
    const komiHead = document.querySelector(".komi-head");
    const earHint = document.getElementById("earHint");
    let earsUnlocked = false;
    let earsFound = false;
    let winking = false;

    function unlockEars() {
      earsUnlocked = true;
      komiHead.classList.add("ready");
      if (!earsFound) {
        setTimeout(() => {
          if (earsFound) return;
          earHint.classList.add("show");
          startWink();
        }, 2000);
      }
    }

    let replayCall = null;
    function offerReplay() {
      if (replayCall) replayCall.kill();
      replayCall = gsap.delayedCall(1.2, () => {
        replayCall = null;
        document.getElementById("replay").classList.add("show");
      });
    }

    function markEarsFound() {
      if (earsFound) return;
      earsFound = true;
      earHint.classList.remove("show");
      stopWink();
      // the replay offer waits until she has found the cat ears
      offerReplay();
    }

    komiHead.addEventListener("click", () => {
      if (!earsUnlocked) return;
      komiHead.classList.toggle("ears");
      if (earsFound && phase === "blown") offerReplay();
      markEarsFound();
    });

    // eyes blink at random intervals
    const eyes = document.querySelectorAll(".komi-eye");
    function blinkOnce() {
      if (winking) return;
      eyes.forEach((e) => {
        e.classList.remove("blink");
        void e.offsetWidth;
        e.classList.add("blink");
      });
    }
    function scheduleBlink() {
      setTimeout(
        () => {
          blinkOnce();
          if (Math.random() < 0.35)
            setTimeout(blinkOnce, 170 + Math.random() * 130);
          scheduleBlink();
        },
        1500 + Math.random() * 3200,
      );
    }
    scheduleBlink();

    // wink at her until she taps for the cat ears
    const winkEye = document.querySelector(".komi-eye-right");
    const winkLid = document.querySelector(".komi-wink");
    const winkBlush = document.querySelectorAll(".komi-blush");
    const komiContainer = document.querySelector(".komi-container");
    let winkTimer = null;
    function retrigger(el, cls) {
      el.classList.remove(cls);
      void el.offsetWidth;
      el.classList.add(cls);
    }
    function winkOnce() {
      winkEye.classList.remove("blink");
      retrigger(winkEye, "wink");
      retrigger(winkLid, "show");
      retrigger(komiContainer, "tilt");
      winkBlush.forEach((b) => retrigger(b, "pop"));
    }
    function winkLoop() {
      if (!winking) return;
      winkOnce();
      winkTimer = setTimeout(winkLoop, 8000);
    }
    function startWink() {
      if (winking) return;
      winking = true;
      winkTimer = setTimeout(winkLoop, 250);
    }
    function stopWink() {
      winking = false;
      if (winkTimer) clearTimeout(winkTimer);
      winkEye.classList.remove("wink");
      winkLid.classList.remove("show");
      komiContainer.classList.remove("tilt");
      winkBlush.forEach((b) => b.classList.remove("pop"));
    }

    // eyes: glance at taps, follow a dragging finger, watch the flame while lit
    const gazeWraps = document.querySelectorAll(".komi-eye-gaze");
    const gazeEyes = document.querySelectorAll(".komi-eye");
    const GAZE_MAX_X = 8; // px the pupils may travel sideways
    const GAZE_MAX_UP = 7;
    const GAZE_MAX_DOWN = 6;
    const GAZE_NEAR = 160; // px; closer touches move the eyes less
    const gaze = { x: 0, y: 0, tx: 0, ty: 0 };
    let gazeDragging = false;
    let gazePointerDown = false;
    let gazeDownX = 0;
    let gazeDownY = 0;
    let glanceTimer = null;
    let gazeRaf = null;

    function gazeFaceCenter() {
      const a = gazeEyes[0].getBoundingClientRect();
      const b = gazeEyes[1].getBoundingClientRect();
      return {
        x: (a.left + a.right + b.left + b.right) / 4,
        y: (a.top + a.bottom + b.top + b.bottom) / 4,
      };
    }

    function gazeAt(px, py) {
      const c = gazeFaceCenter();
      const dx = px - c.x;
      const dy = py - c.y;
      const dist = Math.hypot(dx, dy) || 1;
      const reach = Math.min(1, dist / GAZE_NEAR);
      gaze.tx = (dx / dist) * GAZE_MAX_X * reach;
      gaze.ty = (dy / dist) * (dy < 0 ? GAZE_MAX_UP : GAZE_MAX_DOWN) * reach;
      gazeWake();
    }

    function gazeRest() {
      // between interactions the eyes settle on the flame while it burns
      if (phase === "lit") {
        const r = flame.getBoundingClientRect();
        gazeAt(r.left + r.width / 2, r.top + r.height / 2);
      } else {
        gaze.tx = 0;
        gaze.ty = 0;
        gazeWake();
      }
    }

    function gazeStep() {
      gaze.x += (gaze.tx - gaze.x) * 0.16;
      gaze.y += (gaze.ty - gaze.y) * 0.16;
      const settled =
        !gazeDragging &&
        Math.abs(gaze.tx - gaze.x) < 0.1 &&
        Math.abs(gaze.ty - gaze.y) < 0.1;
      if (settled) {
        gaze.x = gaze.tx;
        gaze.y = gaze.ty;
      }
      gazeWraps.forEach((w) => {
        w.style.transform = `translate(${gaze.x.toFixed(2)}px, ${gaze.y.toFixed(2)}px)`;
      });
      gazeRaf = settled ? null : requestAnimationFrame(gazeStep);
    }

    function gazeWake() {
      if (gazeRaf === null) gazeRaf = requestAnimationFrame(gazeStep);
    }

    function gazePointerEnd() {
      if (!gazePointerDown) return;
      gazePointerDown = false;
      if (gazeDragging) {
        gazeDragging = false;
        gazeRest();
      } else {
        // a plain tap holds the glance briefly, then the eyes drift back
        glanceTimer = setTimeout(gazeRest, 700);
      }
    }

    // native image/text drag cancels the pointer stream mid-gesture
    window.addEventListener("dragstart", (e) => e.preventDefault());

    if (!prefersReduced) {
      window.addEventListener("pointerdown", (e) => {
        if (!e.isPrimary) return;
        gazePointerDown = true;
        gazeDragging = false;
        gazeDownX = e.clientX;
        gazeDownY = e.clientY;
        clearTimeout(glanceTimer);
        gazeAt(e.clientX, e.clientY);
      });
      window.addEventListener("pointermove", (e) => {
        if (!e.isPrimary || !gazePointerDown) return;
        if (
          !gazeDragging &&
          Math.hypot(e.clientX - gazeDownX, e.clientY - gazeDownY) < 6
        )
          return;
        gazeDragging = true;
        gazeAt(e.clientX, e.clientY);
      });
      window.addEventListener("pointerup", gazePointerEnd);
      window.addEventListener("pointercancel", gazePointerEnd);
    }

    // gift and plant hop at the blow-out; only the plant hops on tap,
    // the gift box has its own easter-egg tap feedback
    const giftBoxEl = document.querySelector(".gifts .g1 .box");
    const plantEl = document.querySelector(".plant svg");
    function hop(el, delay = 0) {
      if (prefersReduced || !el) return;
      setTimeout(() => {
        el.classList.remove("hop", "shake");
        void el.getBoundingClientRect();
        el.classList.add("hop");
      }, delay);
    }
    function hopAll() {
      hop(giftBoxEl, 150);
      hop(plantEl, 240);
    }
    if (plantEl) plantEl.addEventListener("pointerdown", () => hop(plantEl));

    // candle: tap to light it, then blow it out
    const flame = document.getElementById("flame");
    const hint = document.getElementById("hint");
    const wrapper = document.querySelector(".wrapper");
    const hasMic = !!(
      navigator.mediaDevices && navigator.mediaDevices.getUserMedia
    );
    let micState = hasMic ? "idle" : "off"; // idle -> starting -> on | off
    let phase = "unlit"; // unlit -> lit -> blown
    let readyToBlow = false;

    gsap.set(flame, { scale: 0, transformOrigin: "bottom center" });
    hint.textContent = "tap the candle to light it";

    // organic idle sway, two waves so it never looks metronomic
    function flameIdleR(t) {
      return Math.sin(t / 260) * 5 + Math.sin(t / 83) * 2.5;
    }
    function flameIdleY(t) {
      return Math.sin(t / 190) * 0.05;
    }
    // single writer while the mic is not live; the mic loop takes over otherwise
    function flameSway() {
      if (phase !== "lit") return;
      const micLive =
        micState === "on" && audioCtx && audioCtx.state === "running";
      if (!micLive) {
        const t = performance.now();
        gsap.set(flame, {
          rotation: flameIdleR(t),
          scaleY: 1 + flameIdleY(t),
        });
      }
      requestAnimationFrame(flameSway);
    }

    function positionRoomLight() {
      const r = flame.getBoundingClientRect();
      const fx = (((r.left + r.width / 2) / window.innerWidth) * 100).toFixed(
        1,
      );
      const fy = (((r.top + r.height / 2) / window.innerHeight) * 100).toFixed(
        1,
      );
      document.documentElement.style.setProperty("--fx", fx + "%");
      document.documentElement.style.setProperty("--fy", fy + "%");
    }

    function lightCandle() {
      if (phase !== "unlit") return;
      phase = "lit";
      positionRoomLight();
      document.body.classList.add("lit");
      gsap.fromTo(
        flame,
        { scale: 0 },
        {
          scale: 1,
          duration: 0.45,
          ease: "back.out(1.7)",
          transformOrigin: "bottom center",
        },
      );
      if (!prefersReduced && !gazePointerDown) gazeRest();
      // the sway starts once the grow-in tween has finished
      if (!prefersReduced) setTimeout(flameSway, 600);
      // wish beat: "make a wish" holds solid, then the blow-out cue resumes the pulse
      hint.textContent = "make a wish";
      hint.classList.add("steady");
      setTimeout(() => {
        if (phase !== "lit") return;
        if (hasMic && micState === "idle") {
          armMic();
          // if the permission prompt stalls or is dismissed, offer the tap
          setTimeout(() => {
            if (phase === "lit" && micState === "starting") {
              setHintCue("tap the candle");
            }
          }, 3000);
        } else if (micState === "on") {
          setHintCue("blow out the candle");
        } else {
          setHintCue("tap the candle");
        }
        readyToBlow = true;
      }, 2200);
    }

    // swapping to the next cue is what ends the "make a wish" solid hold
    function setHintCue(text) {
      hint.textContent = text;
      hint.classList.remove("steady");
    }

    // blow-out beats: dark + smoke, light returns, confetti + hops, then the words
    function blowOut() {
      if (phase !== "lit") return;
      phase = "blown";
      hint.classList.add("hide");
      gsap.to(flame, {
        scale: 0,
        opacity: 0,
        duration: 0.35,
        ease: "power2.in",
        transformOrigin: "bottom center",
      });
      puffSmoke();
      const r = flame.getBoundingClientRect();
      setTimeout(() => document.body.classList.remove("lit"), 1300);
      setTimeout(
        () => burstConfetti(r.left + r.width / 2, r.top + r.height / 2),
        2000,
      );
      setTimeout(() => cannonConfetti(-10, window.innerHeight, 1), 2200);
      setTimeout(
        () => cannonConfetti(window.innerWidth + 10, window.innerHeight, -1),
        2350,
      );
      setTimeout(() => confettiRain(3200), 2400);
      setTimeout(hopAll, 2100);
      if (!prefersReduced && !gazePointerDown) gazeRest();
      if (!hasPlayedMessages) startMessages();
    }

    function armMic() {
      if (micState !== "idle") return;
      micState = "starting";
      navigator.mediaDevices
        .getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          },
        })
        .then(listenForBlow)
        .catch(() => {
          micState = "off";
          setHintCue("tap the candle");
        });
    }

    let audioCtx = null;
    function listenForBlow(stream) {
      const AC = window.AudioContext || window.webkitAudioContext;
      const ac = new AC();
      audioCtx = ac;
      if (ac.state === "suspended") ac.resume();
      // iOS keeps the context suspended until a user gesture; retry on every tap
      window.addEventListener("pointerdown", () => {
        if (ac.state !== "running") ac.resume();
      });
      const analyser = ac.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.6;
      ac.createMediaStreamSource(stream).connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);

      micState = "on";
      setHintCue("blow out the candle");
      gsap.set(flame, { transformOrigin: "bottom center" });

      const THRESH = 88; // low-band loudness that counts as a blow
      const NEED = 5; // frames in a row to confirm
      let over = 0;

      function loop() {
        analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let i = 2; i < 24; i++) sum += data[i];
        const level = sum / 22;

        if (phase === "lit") {
          const w = Math.min(level / 100, 1.2);
          const t = performance.now();
          gsap.set(flame, {
            rotation: flameIdleR(t) + Math.sin(t / 45) * 16 * w,
            scaleY: 1 + flameIdleY(t) - Math.min(w * 0.3, 0.34),
          });
          if (level > THRESH) {
            if (++over >= NEED) blowOut();
          } else {
            over = Math.max(0, over - 1);
          }
        } else {
          over = 0;
        }
        requestAnimationFrame(loop);
      }
      loop();
    }

    // keyboard fallback for lighting
    window.addEventListener("keydown", lightCandle);

    // tapping the candle lights it; once lit, a tap blows it out unless the mic is
    // live: covers denial, a stalled permission prompt, and iOS keeping the audio
    // context suspended
    wrapper.addEventListener("click", () => {
      if (phase === "unlit") {
        lightCandle();
        return;
      }
      if (phase !== "lit" || !readyToBlow) return;
      const micLive =
        micState === "on" && audioCtx && audioCtx.state === "running";
      if (!micLive) blowOut();
    });

    // replay: reset the scene so she can light and blow again
    const replay = document.getElementById("replay");
    function resetScene() {
      phase = "unlit";
      readyToBlow = false;
      document.body.classList.remove("lit");
      gsap.set(flame, {
        scale: 0,
        opacity: 1,
        rotation: 0,
        scaleY: 1,
        transformOrigin: "bottom center",
      });
      hint.classList.remove("steady");
      hint.textContent = "tap the candle to light it";
      // wait 500ms for the replay button to finish fading out, then fade the hint
      // in. .appearing suppresses the pulse so opacity can transition instead of
      // popping. The pulse resumes at full opacity once the fade-in ends.
      hint.classList.add("appearing");
      setTimeout(() => {
        hint.classList.remove("hide");
        hint.addEventListener(
          "transitionend",
          () => hint.classList.remove("appearing"),
          { once: true },
        );
      }, 500);
      if (replayCall) {
        replayCall.kill();
        replayCall = null;
      }
      replay.classList.remove("show");
      // after the first full run the last message and the found ears stay
      if (!hasPlayedMessages) {
        stopMessages();
        earsUnlocked = false;
        earsFound = false;
        stopWink();
        earHint.classList.remove("show");
        komiHead.classList.remove("ready", "ears");
      }
    }
    replay.addEventListener("click", (e) => {
      e.stopPropagation();
      resetScene();
    });
  </script>
</html>
